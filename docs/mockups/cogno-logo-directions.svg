<svg width="1400" height="1600" viewBox="0 0 1400 1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldStroke" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1b8"/>
      <stop offset="0.42" stop-color="#e7bf63"/>
      <stop offset="1" stop-color="#9f6f2d"/>
    </linearGradient>
    <linearGradient id="sandFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe7a1"/>
      <stop offset="1" stop-color="#c58a36"/>
    </linearGradient>
    <linearGradient id="cyanStroke" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9efcff"/>
      <stop offset="1" stop-color="#2db7c9"/>
    </linearGradient>
    <radialGradient id="panelGlow" cx="50%" cy="28%" r="74%">
      <stop offset="0" stop-color="#123441" stop-opacity="0.64"/>
      <stop offset="0.58" stop-color="#07131b" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#020509" stop-opacity="1"/>
    </radialGradient>
    <filter id="softGoldGlow" x="-30%" y="-40%" width="160%" height="180%">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.88 0 1 0 0 0.64 0 0 1 0 0.22 0 0 0 0.72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyanGlow" x="-30%" y="-40%" width="160%" height="180%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.82 0 0 0 0 0.86 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="stoneGrid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2a4651" stroke-width="1" opacity="0.18"/>
      <path d="M0 24H42" fill="none" stroke="#8f6f35" stroke-width="0.8" opacity="0.08"/>
    </pattern>
    <style>
      .label { font-family: Trebuchet MS, Arial, sans-serif; font-size: 19px; fill: #9bb3bd; letter-spacing: 2px; }
      .caption { font-family: Trebuchet MS, Arial, sans-serif; font-size: 14px; fill: #69838f; letter-spacing: 0.5px; }
      .panel-title { font-family: Georgia, serif; font-size: 25px; fill: #f4d688; letter-spacing: 4px; }
      .word-text { font-family: Georgia, Times New Roman, serif; font-weight: 700; letter-spacing: 10px; }
      .stroke-logo { fill: none; stroke: url(#goldStroke); stroke-width: 11; stroke-linecap: round; stroke-linejoin: round; filter: url(#softGoldGlow); }
      .stroke-logo-thin { fill: none; stroke: url(#goldStroke); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .cyan { fill: none; stroke: url(#cyanStroke); stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; filter: url(#cyanGlow); }
      .cyan-thin { fill: none; stroke: url(#cyanStroke); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .micro { fill: #0b151b; stroke: url(#goldStroke); stroke-width: 2; }
    </style>
