<svg width="1400" height="1120" viewBox="0 0 1400 1120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff4bd"/>
      <stop offset="0.36" stop-color="#ecc86f"/>
      <stop offset="0.7" stop-color="#c4913f"/>
      <stop offset="1" stop-color="#81592b"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1ad"/>
      <stop offset="1" stop-color="#c68a33"/>
