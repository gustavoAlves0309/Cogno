    <radialGradient id="bg" cx="50%" cy="20%" r="82%">
      <stop offset="0" stop-color="#103441"/>
      <stop offset="0.55" stop-color="#06131b"/>
      <stop offset="1" stop-color="#020509"/>
    </radialGradient>
    <filter id="goldGlow" x="-25%" y="-40%" width="150%" height="180%">
