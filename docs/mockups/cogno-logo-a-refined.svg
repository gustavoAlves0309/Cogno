      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.9 0 1 0 0 0.66 0 0 1 0 0.2 0 0 0 0.58 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
