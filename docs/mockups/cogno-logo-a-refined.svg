      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.86 0 0 0 0 0.88 0 0 0 0.62 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#27454f" stroke-width="1" opacity="0.18"/>
      <path d="M0 25H42" fill="none" stroke="#9b7336" stroke-width="0.8" opacity="0.08"/>
    </pattern>
    <style>
      .ui { font-family: Trebuchet MS, Arial, sans-serif; fill: #91adba; letter-spacing: 1.5px; }
      .title { font-family: Georgia, Times New Roman, serif; fill: #f4d586; letter-spacing: 3px; font-size: 25px; }
      .caption { font-family: Trebuchet MS, Arial, sans-serif; fill: #78939d; font-size: 15px; }
      .logoStroke { fill: none; stroke: url(#gold); stroke-width: 13; stroke-linecap: round; stroke-linejoin: round; filter: url(#goldGlow); }
      .logoStrokeMid { fill: none; stroke: url(#gold); stroke-width: 8.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#goldGlow); }
      .logoStrokeThin { fill: none; stroke: url(#gold); stroke-width: 4.4; stroke-linecap: round; stroke-linejoin: round; }
      .cyanStroke { fill: none; stroke: url(#cyan); stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#cyanGlow); }
    </style>
  </defs>

  <rect width="1400" height="1120" fill="url(#bg)"/>
